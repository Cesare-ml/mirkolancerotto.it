<div
  class="social-links flex flex-wrap items-center gap-3"
  [class.text-[var(--site-text)]]="monochrome"
  [class.text-white]="!monochrome">
  @for (link of links; track link.key) {
    <a
      class="social-link"
      [class.social-link--compact]="compact"
      [href]="link.href"
      target="_blank"
      rel="noopener noreferrer"
      [attr.aria-label]="link.label"
      [attr.title]="link.label">
      <svg
        class="social-link__icon"
        [attr.viewBox]="link.viewBox"
        aria-hidden="true"
        focusable="false">
        <path [attr.d]="link.path" fill="currentColor"></path>
      </svg>

      @if (!compact) {
        <span class="social-link__label">{{ link.label }}</span>
      }
    </a>
  }
</div>
