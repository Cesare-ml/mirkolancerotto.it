<section class="editorial-section mx-auto max-w-7xl px-5 py-16 sm:px-8 lg:px-12 lg:py-24">
  <div class="editorial-section__head max-w-3xl">
    <p class="text-xs uppercase tracking-[0.28em] text-[var(--site-muted)]">{{ eyebrow }}</p>
    <h2 class="mt-4 text-4xl leading-tight text-[var(--site-text)] sm:text-5xl">{{ title }}</h2>
  </div>

  <div class="editorial-section__items mt-12 grid gap-10 lg:grid-cols-3">
    @for (item of items; track item.title) {
      <article class="editorial-section__item">
        <h3 class="text-xs uppercase tracking-[0.26em] text-[var(--site-muted)]">{{ item.title }}</h3>
        <p class="mt-4 text-sm leading-8 text-[var(--site-text)]/82 sm:text-base">{{ item.body }}</p>
      </article>
    }
  </div>

  <figure class="editorial-section__figure mt-12 overflow-hidden rounded-[2rem]">
    <img class="editorial-section__image w-full" [src]="image" [alt]="imageAlt" />
  </figure>
</section>
