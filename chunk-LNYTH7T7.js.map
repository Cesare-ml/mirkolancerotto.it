<section class="quote-section mx-auto max-w-[96rem] px-4 py-12 sm:px-6 lg:px-10 lg:py-20">
  <figure class="quote-section__frame overflow-hidden rounded-[2.25rem]">
    <div class="quote-section__quote-wrap px-6 pb-0 pt-8 sm:px-10 lg:px-14 lg:pt-12">
      <blockquote class="max-w-5xl text-4xl leading-[1.02] text-[var(--site-text)] sm:text-6xl lg:text-7xl">
        {{ quote }}
      </blockquote>
    </div>

    <img class="quote-section__image mt-8 w-full" [src]="image" [alt]="imageAlt" />
  </figure>
</section>
