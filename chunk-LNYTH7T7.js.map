<section class="manifesto-section bg-white px-5 py-12 sm:px-8 lg:px-12">
  <div class="mx-auto max-w-7xl">
    <p class="text-xs uppercase tracking-[0.28em] text-[var(--site-muted)]">{{ eyebrow }}</p>

    <div class="mt-8">
      @for (phrase of phrases; track phrase; let index = $index) {
        <div class="manifesto-section__phrase-wrap">
          <p class="manifesto-section__phrase" [style.animation-delay.ms]="index * 80">
            {{ phrase }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
