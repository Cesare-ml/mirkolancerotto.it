<section class="large-image-section mx-auto max-w-7xl px-5 py-16 sm:px-8 lg:px-12 lg:py-24">
  <figure class="large-image-section__visual overflow-hidden rounded-[2rem]">
    <img class="large-image-section__image w-full" [src]="image" [alt]="imageAlt" />
  </figure>

  <div class="mt-10 max-w-4xl">
    <p class="text-xs uppercase tracking-[0.28em] text-[var(--site-muted)]">{{ eyebrow }}</p>
    <h2 class="mt-4 text-4xl leading-tight text-[var(--site-text)] sm:text-5xl">{{ title }}</h2>

    <div class="mt-8 space-y-5 text-sm leading-8 text-[var(--site-text)]/82 sm:text-base">
      @for (paragraph of paragraphs; track paragraph) {
        <p>{{ paragraph }}</p>
      }
    </div>
  </div>
</section>
