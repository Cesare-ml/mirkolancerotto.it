<section class="split-section mx-auto max-w-7xl px-5 py-16 sm:px-8 lg:px-12 lg:py-24">
  <div class="split-section__layout grid gap-10 lg:grid-cols-[0.92fr_1.08fr] lg:gap-14" [class.split-section__layout--reverse]="reverse">
    <div class="split-section__copy">
      @if (eyebrow) {
        <p class="text-xs uppercase tracking-[0.28em] text-[var(--site-muted)]">{{ eyebrow }}</p>
      }

      @if (title) {
        <h2 class="mt-4 max-w-2xl text-4xl leading-tight text-[var(--site-text)] sm:text-5xl">{{ title }}</h2>
      }

      <div class="mt-8 space-y-5 text-sm leading-8 text-[var(--site-text)]/82 sm:text-base">
        @for (paragraph of paragraphs; track paragraph) {
          <p>{{ paragraph }}</p>
        }
      </div>
    </div>

    <figure class="split-section__visual">
      <img class="split-section__image" [src]="image" [alt]="imageAlt" />
    </figure>
  </div>
</section>
