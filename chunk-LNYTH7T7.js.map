<section class="cta-section mx-auto max-w-7xl px-5 py-16 sm:px-8 lg:px-12 lg:py-24">
  <div class="cta-section__panel overflow-hidden rounded-[2rem] border border-[var(--site-border)] bg-[var(--site-surface)] lg:grid lg:grid-cols-[0.95fr_1.05fr]">
    <figure class="cta-section__visual">
      <img class="cta-section__image w-full" [src]="image" [alt]="imageAlt" />
    </figure>

    <div class="cta-section__copy p-6 sm:p-10 lg:p-12">
      <h2 class="text-4xl leading-tight text-[var(--site-text)] sm:text-5xl">{{ title }}</h2>
      <p class="mt-6 max-w-2xl text-sm leading-8 text-[var(--site-text)]/82 sm:text-base">
        {{ body }}
      </p>

      <div class="mt-8 flex flex-wrap gap-3">
        @for (action of actions; track action.url) {
          <a
            [routerLink]="action.url"
            class="cta-section__button inline-flex rounded-full px-5 py-3 text-xs uppercase tracking-[0.2em] no-underline">
            {{ action.label }}
          </a>
        }
      </div>
    </div>
  </div>
</section>
