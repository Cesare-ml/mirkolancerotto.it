@if (vm$ | async; as vm) {
  <article class="about-page">
    <app-hero-section
      [image]="vm.content.hero.image"
      [title]="vm.content.hero.title[vm.language] || vm.content.hero.title.it"
      [subtitle]="vm.content.hero.subtitle[vm.language] || vm.content.hero.subtitle.it"
      [scrollLabel]="vm.content.hero.scrollLabel[vm.language] || vm.content.hero.scrollLabel.it" />

    <app-split-section
      [eyebrow]="vm.content.research.eyebrow[vm.language] || vm.content.research.eyebrow.it"
      [title]="vm.content.research.title[vm.language] || vm.content.research.title.it"
      [paragraphs]="[
        vm.content.research.paragraphs[0][vm.language] || vm.content.research.paragraphs[0].it,
        vm.content.research.paragraphs[1][vm.language] || vm.content.research.paragraphs[1].it,
        vm.content.research.paragraphs[2][vm.language] || vm.content.research.paragraphs[2].it,
        vm.content.research.paragraphs[3][vm.language] || vm.content.research.paragraphs[3].it,
        vm.content.research.paragraphs[4][vm.language] || vm.content.research.paragraphs[4].it,
        vm.content.research.paragraphs[5][vm.language] || vm.content.research.paragraphs[5].it
      ]"
      [image]="vm.content.research.image"
      [imageAlt]="vm.content.research.imageAlt[vm.language] || vm.content.research.imageAlt.it" />

    <app-quote-section
      [image]="vm.content.quote.image"
      [imageAlt]="vm.content.quote.imageAlt[vm.language] || vm.content.quote.imageAlt.it"
      [quote]="vm.content.quote.text[vm.language] || vm.content.quote.text.it" />

    <app-editorial-section
      [eyebrow]="vm.content.beyondPainting.eyebrow[vm.language] || vm.content.beyondPainting.eyebrow.it"
      [title]="vm.content.beyondPainting.title[vm.language] || vm.content.beyondPainting.title.it"
      [items]="[
        {
          title: vm.content.beyondPainting.items[0].title[vm.language] || vm.content.beyondPainting.items[0].title.it,
          body: vm.content.beyondPainting.items[0].body[vm.language] || vm.content.beyondPainting.items[0].body.it
        },
        {
          title: vm.content.beyondPainting.items[1].title[vm.language] || vm.content.beyondPainting.items[1].title.it,
          body: vm.content.beyondPainting.items[1].body[vm.language] || vm.content.beyondPainting.items[1].body.it
        },
        {
          title: vm.content.beyondPainting.items[2].title[vm.language] || vm.content.beyondPainting.items[2].title.it,
          body: vm.content.beyondPainting.items[2].body[vm.language] || vm.content.beyondPainting.items[2].body.it
        }
      ]"
      [image]="vm.content.beyondPainting.image"
      [imageAlt]="vm.content.beyondPainting.imageAlt[vm.language] || vm.content.beyondPainting.imageAlt.it" />

    <app-split-section
      [eyebrow]="vm.content.presence.eyebrow[vm.language] || vm.content.presence.eyebrow.it"
      [title]="vm.content.presence.title[vm.language] || vm.content.presence.title.it"
      [paragraphs]="[
        vm.content.presence.paragraphs[0][vm.language] || vm.content.presence.paragraphs[0].it,
        vm.content.presence.paragraphs[1][vm.language] || vm.content.presence.paragraphs[1].it,
        vm.content.presence.paragraphs[2][vm.language] || vm.content.presence.paragraphs[2].it,
        vm.content.presence.paragraphs[3][vm.language] || vm.content.presence.paragraphs[3].it,
        vm.content.presence.paragraphs[4][vm.language] || vm.content.presence.paragraphs[4].it
      ]"
      [image]="vm.content.presence.image"
      [imageAlt]="vm.content.presence.imageAlt[vm.language] || vm.content.presence.imageAlt.it"
      [reverse]="vm.content.presence.reverse === true" />

    <app-large-image-section
      [eyebrow]="vm.content.search.eyebrow[vm.language] || vm.content.search.eyebrow.it"
      [title]="vm.content.search.title[vm.language] || vm.content.search.title.it"
      [image]="vm.content.search.image"
      [imageAlt]="vm.content.search.imageAlt[vm.language] || vm.content.search.imageAlt.it"
      [paragraphs]="[
        vm.content.search.paragraphs[0][vm.language] || vm.content.search.paragraphs[0].it,
        vm.content.search.paragraphs[1][vm.language] || vm.content.search.paragraphs[1].it,
        vm.content.search.paragraphs[2][vm.language] || vm.content.search.paragraphs[2].it,
        vm.content.search.paragraphs[3][vm.language] || vm.content.search.paragraphs[3].it
      ]" />

    <app-manifesto-section
      [eyebrow]="vm.content.manifesto.eyebrow[vm.language] || vm.content.manifesto.eyebrow.it"
      [phrases]="[
        vm.content.manifesto.phrases[0][vm.language] || vm.content.manifesto.phrases[0].it,
        vm.content.manifesto.phrases[1][vm.language] || vm.content.manifesto.phrases[1].it,
        vm.content.manifesto.phrases[2][vm.language] || vm.content.manifesto.phrases[2].it,
        vm.content.manifesto.phrases[3][vm.language] || vm.content.manifesto.phrases[3].it,
        vm.content.manifesto.phrases[4][vm.language] || vm.content.manifesto.phrases[4].it
      ]" />

    <app-cta-section
      [image]="vm.content.cta.image"
      [imageAlt]="vm.content.cta.imageAlt[vm.language] || vm.content.cta.imageAlt.it"
      [title]="vm.content.cta.title[vm.language] || vm.content.cta.title.it"
      [body]="vm.content.cta.body[vm.language] || vm.content.cta.body.it"
      [actions]="[
        {
          label: vm.content.cta.actions[0].label[vm.language] || vm.content.cta.actions[0].label.it,
          url: vm.artworksPath
        },
        {
          label: vm.content.cta.actions[1].label[vm.language] || vm.content.cta.actions[1].label.it,
          url: vm.contactsPath
        }
      ]" />
  </article>
}
