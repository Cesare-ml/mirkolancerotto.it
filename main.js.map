@if (vm$ | async; as vm) {
  <app-header
    [artistName]="vm.siteConfig.artistName"
    [socialLinks]="vm.siteConfig.social"
    [currentLanguage]="vm.currentLanguage"
    [italianPath]="vm.italianPath"
    [englishPath]="vm.englishPath" />

  <main class="site-shell min-h-dvh bg-[var(--site-background)] pt-20">
    <router-outlet />
  </main>

  <app-footer
    [artistName]="vm.siteConfig.artistName"
    [email]="vm.siteConfig.email"
    [socialLinks]="vm.siteConfig.social"
    [currentLanguage]="vm.currentLanguage"
    [siteConfig]="vm.siteConfig" />

  <app-cookie-banner [language]="vm.currentLanguage" />
}
