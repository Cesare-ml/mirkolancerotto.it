@if (sameSeries.length > 0) {
  <app-artwork-grid
    [artworks]="sameSeries"
    [language]="language"
    [title]="language === 'it' ? 'Dalla stessa serie' : 'From the same series'"
    [subtitle]="language === 'it' ? 'Una continuità naturale per proseguire la lettura dell’opera.' : 'A natural continuity to keep reading the artwork.'"
    [emptyMessage]="''" />
}

@if (availableArtworks.length > 0) {
  <app-artwork-grid
    [artworks]="availableArtworks"
    [language]="language"
    layout="editorial"
    [title]="language === 'it' ? 'Continua tra le opere' : 'Continue through the artworks'"
    [subtitle]="language === 'it' ? 'Il percorso riprende dall’archivio e prosegue nelle opere successive.' : 'The sequence resumes from the archive and continues through the following works.'"
    [emptyMessage]="''" />
}
